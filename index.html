<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Naughty Place</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container first-container">
        <h1>Naughty Place</h1>
        <p class="message">So you have found this place... how naughty of you~</p>
        <button class="naughty-button">Click me Darlin~</button>
    </div>
    <div class="container second-container">
        <h2>Choose your way~</h2>
        <div class="selection-buttons">
            <button class="way-button rbxl-button">Way to RR34</button>
            <button class="way-button way-3d-button">Way to 3D</button>
            <button class="way-button way-2d-button">Way to 2D</button>
            <button class="way-button wip-button">WIP</button>
        </div>
    </div>
    <div class="container rr34-container">
        <h2>RR34 Section</h2>
        <p>Welcome to the RR34 section!</p>
        <div class="rr34-buttons">
            <button class="way-button download-rr34-button">Download Current RR34 Game ZIP</button>
            <button class="way-button go-back-rr34-button">Go Back</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
